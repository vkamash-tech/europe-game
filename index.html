<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Збери карту Європи</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#eef6ff;
}

#map{
width:500px;
height:350px;
margin:auto;
border:3px solid #444;
display:flex;
flex-wrap:wrap;
}

.slot{
width:100px;
height:100px;
border:1px dashed gray;
display:flex;
align-items:center;
justify-content:center;
}

.country{
padding:8px;
margin:5px;
background:#4CAF50;
color:white;
cursor:grab;
display:inline-block;
}

.correct{
background:#2196F3;
}
</style>
</head>

<body>

<h1>Збери карту Європи</h1>

<p>Перетягни країну на правильне місце</p>

<div id="map">

<div class="slot" data-country="Франція"></div>
<div class="slot" data-country="Німеччина"></div>
<div class="slot" data-country="Італія"></div>
<div class="slot" data-country="Іспанія"></div>

</div>

<h3>Країни</h3>

<div id="countries">

<div class="country" draggable="true">Франція</div>
<div class="country" draggable="true">Німеччина</div>
<div class="country" draggable="true">Італія</div>
<div class="country" draggable="true">Іспанія</div>

</div>

<script>

let countries=document.querySelectorAll(".country");
let slots=document.querySelectorAll(".slot");

countries.forEach(c=>{
c.addEventListener("dragstart",dragStart)
})

slots.forEach(s=>{
s.addEventListener("dragover",e=>e.preventDefault())
s.addEventListener("drop",drop)
})

let dragged

function dragStart(){
dragged=this
}

function drop(){

if(this.dataset.country===dragged.innerText){

this.innerText=dragged.innerText
this.classList.add("correct")
dragged.remove()

}else{
alert("Неправильно!")
}

}

</script>

</body>
</html>
