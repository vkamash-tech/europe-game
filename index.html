<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Збери карту Європи</title>
    <style>
        body { font-family: sans-serif; background: #f0f8ff; text-align: center; margin: 0; padding: 20px; }
        .game-title { color: #2c3e50; margin-bottom: 10px; }
        
        /* Поле карти */
        #map-container {
            position: relative;
            width: 600px;
            height: 450px;
            background: white;
            border: 3px solid #34495e;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Зони куди ставити (тіні країн) */
        .dropzone {
            position: absolute;
            border: 2px dashed #bdc3c7;
            background: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #95a5a6;
            font-size: 12px;
            border-radius: 5px;
        }

        /* Країни, які ми тягнемо */
        .country {
            width: 100px;
            height: 60px;
            background: #27ae60;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            cursor: grab;
            border-radius: 8px;
            font-weight: bold;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .country:active { cursor: grabbing; }

        .correct { background: #2ecc71 !important; border: 2px solid #27ae60; color: white !important; cursor: default; }
    </style>
</head>
<body>

    <h1 class="game-title">Збери карту Європи</h1>
    <p>Перетягніть назву країни на її правильне місце на карті!</p>

    <div id="map-container">
        <div class="dropzone" id="zone-ukraine" style="top: 200px; left: 380px; width: 140px; height: 90px;">Україна</div>
        <div class="dropzone" id="zone-france" style="top: 220px; left: 80px; width: 100px; height: 80px;">Франція</div>
        <div class="dropzone" id="zone-germany" style="top: 180px; left: 200px; width: 90px; height: 80px;">Німеччина</div>
        <div class="dropzone" id="zone-italy" style="top: 320px; left: 210px; width: 70px; height: 90px;">Італія</div>
        <div class="dropzone" id="zone-spain" style="top: 330px; left: 20px; width: 100px; height: 80px;">Іспанія</div>
    </div>

    <div id="countries-pool">
        <div class="country" draggable="true" id="ukraine">Україна</div>
        <div class="country" draggable="true" id="germany">Німеччина</div>
        <div class="country" draggable="true" id="france">Франція</div>
        <div class="country" draggable="true" id="spain">Іспанія</div>
        <div class="country" draggable="true" id="italy">Італія</div>
    </div>

    <script>
        const countries = document.querySelectorAll('.country');
        const zones = document.querySelectorAll('.dropzone');

        countries.forEach(country => {
            country.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text', e.target.id);
            });
        });

        zones.forEach(zone => {
            zone.addEventListener('dragover', e => {
                e.preventDefault();
            });

            zone.addEventListener('drop', e => {
                e.preventDefault();
                const countryId = e.dataTransfer.getData('text');
                const zoneId = e.target.id;

                // Перевірка чи країна підходить до зони
                if (zoneId === 'zone-' + countryId) {
                    const countryEl = document.getElementById(countryId);
                    e.target.innerHTML = countryEl.innerHTML;
                    e.target.classList.add('correct');
                    countryEl.style.visibility = 'hidden'; // Ховаємо використану кнопку
                    checkWin();
                } else {
                    alert("Неправильно! Спробуй інше місце.");
                }
            });
        });

        function checkWin() {
            if (document.querySelectorAll('.correct').length === 5) {
                alert("Вітаємо! Ви зібрали карту Європи! 🎉");
            }
        }
    </script>
</body>
</html>
